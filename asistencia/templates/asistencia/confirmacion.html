<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asistencia UNCAUS</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #132338;
      --muted: #5d6d80;
      --accent: #005bbb;
      --accent-hover: #004a97;
      --border: #d8e0ea;
      --ok: #13864d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #eef3f9 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.5;
      display: grid;
      place-items: start center;
    }
    main {
      width: 100%;
      max-width: 560px;
      padding: 1.2rem 1rem 2.2rem;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding: 0.8rem;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    .brand {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 8px 24px rgba(18, 35, 56, 0.08);
      text-align: center;
    }
    .ok {
      margin: 0;
      padding: 0.9rem;
      border-radius: 10px;
      background: rgba(19, 134, 77, 0.12);
      border: 1px solid rgba(19, 134, 77, 0.3);
      color: var(--ok);
      font-weight: 600;
    }
    .volver {
      display: inline-block;
      margin-top: 1rem;
      min-height: 44px;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    .volver:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div class="logo">UNCAUS</div>
      <p class="brand">Universidad Nacional del Chaco Austral</p>
    </div>

    <div class="card">
      <p class="ok">asistencia registrada correctametne</p>
      <a class="volver" href="{% url 'asistencia:formulario' %}">Cargar nueva asistencia</a>
    </div>
  </main>
</body>
</html>
